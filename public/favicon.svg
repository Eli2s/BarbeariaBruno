<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bottom cap -->
  <rect x="14" y="52" width="36" height="8" rx="4" fill="#3d3d3d"/>
  <rect x="16" y="50" width="32" height="4" rx="1" fill="#b0b0b0"/>
  <!-- Top cap -->
  <rect x="14" y="4" width="36" height="8" rx="4" fill="#3d3d3d"/>
  <rect x="16" y="10" width="32" height="4" rx="1" fill="#b0b0b0"/>
  <!-- Pole body -->
  <defs>
    <clipPath id="pole">
      <rect x="18" y="14" width="28" height="36" rx="2"/>
    </clipPath>
  </defs>
  <rect x="18" y="14" width="28" height="36" rx="2" fill="#e8e8e8"/>
  <g clip-path="url(#pole)">
    <!-- Diagonal stripes -->
    <rect x="2" y="10" width="12" height="60" transform="rotate(-25 32 32)" fill="#4a90d9"/>
    <rect x="16" y="10" width="12" height="60" transform="rotate(-25 32 32)" fill="#e85050"/>
    <rect x="30" y="10" width="12" height="60" transform="rotate(-25 32 32)" fill="#4a90d9"/>
    <rect x="44" y="10" width="12" height="60" transform="rotate(-25 32 32)" fill="#e85050"/>
    <rect x="58" y="10" width="12" height="60" transform="rotate(-25 32 32)" fill="#4a90d9"/>
  </g>
  <!-- Ball top -->
  <circle cx="32" cy="4" r="5" fill="#4a4a4a"/>
</svg>
